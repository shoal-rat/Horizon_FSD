<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="440" viewBox="0 0 1280 440" role="img" aria-labelledby="title desc">
  <title id="title">Horizon FSD</title>
  <desc id="desc">Hero banner for a Forza Horizon 6 self-driving project using screen capture, Data Out telemetry, DreamerV3, and a virtual gamepad.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.52" stop-color="#102844"/>
      <stop offset="1" stop-color="#0a141d"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#273b4c"/>
      <stop offset="1" stop-color="#05070a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.45" stop-color="#34d399"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 800 76px "Segoe UI", Arial, sans-serif; fill: #f7fbff; }
      .subtitle { font: 500 25px "Segoe UI", Arial, sans-serif; fill: #bfd5e8; }
      .chip { font: 650 15px "Segoe UI", Arial, sans-serif; fill: #edf7ff; }
      .panel-title { font: 750 20px "Segoe UI", Arial, sans-serif; fill: #f4f9ff; }
      .panel-text { font: 560 15px "Segoe UI", Arial, sans-serif; fill: #c7d7e8; }
      .mono { font: 650 14px "Cascadia Mono", Consolas, monospace; fill: #bfe9ff; }
      .glass { fill: rgba(12, 24, 40, 0.78); stroke: rgba(162, 190, 220, 0.28); stroke-width: 1.2; }
      .road-line { fill: none; stroke: #fbbf24; stroke-width: 5; stroke-linecap: round; stroke-dasharray: 18 18; }
      .route { fill: none; stroke: url(#accent); stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1280" height="440" rx="30" fill="url(#bg)"/>
  <circle cx="1040" cy="86" r="190" fill="#1e4f75" opacity="0.18"/>
  <circle cx="1160" cy="245" r="240" fill="#14503f" opacity="0.14"/>

  <path d="M0 326 C180 282 315 286 460 322 C602 358 720 358 858 320 C1025 274 1166 278 1280 318 L1280 440 L0 440 Z" fill="#061019"/>
  <path d="M230 440 C365 366 495 326 632 310 C780 293 934 315 1114 381 C1172 402 1228 424 1280 440 Z" fill="url(#road)"/>
  <path class="road-line" d="M636 314 C656 346 686 394 714 440"/>
  <path d="M584 316 C543 356 502 398 466 440" stroke="rgba(230, 242, 255, 0.24)" stroke-width="2" fill="none"/>
  <path d="M666 315 C728 352 779 394 824 440" stroke="rgba(230, 242, 255, 0.24)" stroke-width="2" fill="none"/>

  <g transform="translate(74 64)">
    <rect width="118" height="6" rx="3" fill="url(#accent)"/>
    <text class="title" x="0" y="92">Horizon FSD</text>
    <text class="subtitle" x="2" y="134">FH6 self-driving with pixels, telemetry, and DreamerV3</text>

    <g transform="translate(0 170)">
      <g>
        <rect class="glass" width="145" height="38" rx="19"/>
        <circle cx="22" cy="19" r="5" fill="#34d399"/>
        <text class="chip" x="38" y="25">Offline Solo</text>
      </g>
      <g transform="translate(162 0)">
        <rect class="glass" width="152" height="38" rx="19"/>
        <circle cx="22" cy="19" r="5" fill="#38bdf8"/>
        <text class="chip" x="38" y="25">Data Out UDP</text>
      </g>
      <g transform="translate(332 0)">
        <rect class="glass" width="142" height="38" rx="19"/>
        <circle cx="22" cy="19" r="5" fill="#fbbf24"/>
        <text class="chip" x="38" y="25">DreamerV3</text>
      </g>
      <g transform="translate(492 0)">
        <rect class="glass" width="138" height="38" rx="19"/>
        <circle cx="22" cy="19" r="5" fill="#f472b6"/>
        <text class="chip" x="38" y="25">55 tests</text>
      </g>
    </g>
  </g>

  <g transform="translate(826 74)" filter="url(#shadow)">
    <rect class="glass" width="360" height="250" rx="24"/>
    <text class="panel-title" x="28" y="42">Live loop</text>
    <text class="panel-text" x="28" y="74">screen capture</text>
    <text class="panel-text" x="28" y="106">Data Out telemetry</text>
    <text class="panel-text" x="28" y="138">world model policy</text>
    <text class="panel-text" x="28" y="170">virtual gamepad</text>

    <path class="route" d="M205 180 C178 156 190 122 226 116 C260 110 284 88 270 58" filter="url(#glow)"/>
    <circle cx="205" cy="180" r="8" fill="#38bdf8"/>
    <circle cx="270" cy="58" r="8" fill="#fbbf24"/>
    <rect x="218" y="92" width="58" height="34" rx="12" fill="#0b1725" stroke="#34d399" stroke-width="2"/>
    <circle cx="235" cy="109" r="4" fill="#34d399"/>
    <circle cx="259" cy="109" r="4" fill="#34d399"/>

    <g transform="translate(28 196)">
      <rect width="144" height="34" rx="10" fill="#0b1725" stroke="rgba(191, 233, 255, 0.30)"/>
      <text class="mono" x="14" y="22">steer throttle brake</text>
    </g>
  </g>
</svg>
