<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="600" viewBox="0 0 1180 600" role="img" aria-labelledby="title desc">
  <title id="title">Horizon FSD hardening stack</title>
  <desc id="desc">Six checks that prevent stale input, bad detector states, and teleport dynamics from entering training data.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0f2238"/>
      <stop offset="1" stop-color="#0a141d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.48" stop-color="#34d399"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <style>
      .title { font: 800 34px "Segoe UI", Arial, sans-serif; fill: #f7fbff; }
      .lede { font: 500 15px "Segoe UI", Arial, sans-serif; fill: #acc7dd; }
      .num { font: 800 15px "Segoe UI", Arial, sans-serif; fill: #07111f; }
      .head { font: 760 19px "Segoe UI", Arial, sans-serif; fill: #f4f9ff; }
      .text { font: 520 14px "Segoe UI", Arial, sans-serif; fill: #c6d7e8; }
      .mono { font: 650 12.5px "Cascadia Mono", Consolas, monospace; fill: #bfe9ff; }
      .card { fill: rgba(13, 25, 42, 0.84); stroke: rgba(160, 190, 220, 0.30); stroke-width: 1.2; }
      .rule { stroke: rgba(160, 190, 220, 0.20); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1180" height="600" rx="28" fill="url(#bg)"/>
  <rect x="48" y="42" width="96" height="6" rx="3" fill="url(#accent)"/>
  <text class="title" x="48" y="86">Training data gates</text>
  <text class="lede" x="50" y="112">The live loop either records a clean transition, recovers, or waits.</text>

  <g filter="url(#shadow)">
    <rect class="card" x="50" y="154" width="330" height="156" rx="18"/>
    <rect class="card" x="425" y="154" width="330" height="156" rx="18"/>
    <rect class="card" x="800" y="154" width="330" height="156" rx="18"/>
    <rect class="card" x="50" y="354" width="330" height="156" rx="18"/>
    <rect class="card" x="425" y="354" width="330" height="156" rx="18"/>
    <rect class="card" x="800" y="354" width="330" height="156" rx="18"/>
  </g>

  <g transform="translate(74 180)">
    <circle cx="0" cy="0" r="18" fill="#38bdf8"/>
    <text class="num" x="-5" y="6">1</text>
    <text class="head" x="34" y="6">Fresh input</text>
    <line class="rule" x1="0" y1="34" x2="282" y2="34"/>
    <text class="text" x="0" y="64">Drop stale UDP packets.</text>
    <text class="text" x="0" y="90">Stop on frozen frames.</text>
    <text class="mono" x="0" y="124">telemetry_lost / frame_lost</text>
  </g>

  <g transform="translate(449 180)">
    <circle cx="0" cy="0" r="18" fill="#34d399"/>
    <text class="num" x="-5" y="6">2</text>
    <text class="head" x="34" y="6">Detector</text>
    <line class="rule" x1="0" y1="34" x2="282" y2="34"/>
    <text class="text" x="0" y="64">End bad episodes early.</text>
    <text class="text" x="0" y="90">Do not reward reverse farming.</text>
    <text class="mono" x="0" y="124">impact / offroute / noprogress</text>
  </g>

  <g transform="translate(824 180)">
    <circle cx="0" cy="0" r="18" fill="#fbbf24"/>
    <text class="num" x="-5" y="6">3</text>
    <text class="head" x="34" y="6">Teleport filter</text>
    <line class="rule" x1="0" y1="34" x2="282" y2="34"/>
    <text class="text" x="0" y="64">Large coordinate jumps reset state.</text>
    <text class="text" x="0" y="90">They are never replay demos.</text>
    <text class="mono" x="0" y="124">safety only</text>
  </g>

  <g transform="translate(74 380)">
    <circle cx="0" cy="0" r="18" fill="#fb7185"/>
    <text class="num" x="-5" y="6">4</text>
    <text class="head" x="34" y="6">Benign halt</text>
    <line class="rule" x1="0" y1="34" x2="282" y2="34"/>
    <text class="text" x="0" y="64">Neutralize the pad on pause.</text>
    <text class="text" x="0" y="90">Wait instead of crashing.</text>
    <text class="mono" x="0" y="124">manual help is allowed</text>
  </g>

  <g transform="translate(449 380)">
    <circle cx="0" cy="0" r="18" fill="#a78bfa"/>
    <text class="num" x="-5" y="6">5</text>
    <text class="head" x="34" y="6">AutoDrive recovery</text>
    <line class="rule" x1="0" y1="34" x2="282" y2="34"/>
    <text class="text" x="0" y="64">Use the pinned waypoint.</text>
    <text class="text" x="0" y="90">Press A only while frozen.</text>
    <text class="mono" x="0" y="124">prompt or drive-back</text>
  </g>

  <g transform="translate(824 380)">
    <circle cx="0" cy="0" r="18" fill="#22d3ee"/>
    <text class="num" x="-5" y="6">6</text>
    <text class="head" x="34" y="6">Stress tests</text>
    <line class="rule" x1="0" y1="34" x2="282" y2="34"/>
    <text class="text" x="0" y="64">NaN and inf are rejected.</text>
    <text class="text" x="0" y="90">Route ends are covered.</text>
    <text class="mono" x="0" y="124">55 tests passing</text>
  </g>

  <text class="mono" x="590" y="562" text-anchor="middle">rule: learn from clean motion, not stale input or teleports</text>
</svg>
