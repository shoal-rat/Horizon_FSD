<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="660" viewBox="0 0 1180 660" role="img" aria-labelledby="title desc">
  <title id="title">Horizon FSD architecture</title>
  <desc id="desc">Architecture diagram showing Forza Horizon 6, capture and telemetry, the RL environment, DreamerV3, replay, recovery, and virtual gamepad output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0f2238"/>
      <stop offset="1" stop-color="#0a141d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.48" stop-color="#34d399"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#000000" flood-opacity="0.40"/>
    </filter>
    <marker id="arrowC" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#5dbfe8"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#4ecb9a"/>
    </marker>
    <marker id="arrowY" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#f2bd45"/>
    </marker>
    <marker id="arrowP" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#ec6ca6"/>
    </marker>
    <style>
      .title { font: 800 34px "Segoe UI", Arial, sans-serif; fill: #f7fbff; }
      .lede { font: 500 15px "Segoe UI", Arial, sans-serif; fill: #acc7dd; }
      .head { font: 760 19px "Segoe UI", Arial, sans-serif; fill: #f4f9ff; }
      .text { font: 520 14px "Segoe UI", Arial, sans-serif; fill: #c6d7e8; }
      .mono { font: 650 12.5px "Cascadia Mono", Consolas, monospace; fill: #bfe9ff; }
      .label { font: 650 12px "Cascadia Mono", Consolas, monospace; fill: #9eb9d2; }
      .card { fill: rgba(13, 25, 42, 0.84); stroke: rgba(160, 190, 220, 0.30); stroke-width: 1.2; }
      .cyan { stroke: #38bdf8; }
      .green { stroke: #34d399; }
      .amber { stroke: #fbbf24; }
      .pink { stroke: #f472b6; }
      .violet { stroke: #a78bfa; }
      .flowC { fill: none; stroke: #5dbfe8; stroke-width: 2.6; }
      .flowG { fill: none; stroke: #4ecb9a; stroke-width: 2.6; }
      .flowY { fill: none; stroke: #f2bd45; stroke-width: 2.6; }
      .flowP { fill: none; stroke: #ec6ca6; stroke-width: 2.6; }
      .dash { fill: none; stroke: #8da8c4; stroke-width: 2.2; stroke-dasharray: 8 8; }
    </style>
  </defs>

  <rect width="1180" height="660" rx="28" fill="url(#bg)"/>
  <rect x="48" y="42" width="96" height="6" rx="3" fill="url(#accent)"/>
  <text class="title" x="48" y="86">System architecture</text>
  <text class="lede" x="50" y="112">The game stays outside the process. Pixels and UDP come in; gamepad input goes out.</text>

  <g filter="url(#shadow)">
    <rect class="card cyan" x="56" y="154" width="260" height="118" rx="18"/>
    <rect class="card cyan" x="56" y="330" width="260" height="118" rx="18"/>
    <rect class="card green" x="388" y="238" width="270" height="150" rx="18"/>
    <rect class="card amber" x="736" y="154" width="282" height="134" rx="18"/>
    <rect class="card violet" x="736" y="360" width="282" height="120" rx="18"/>
    <rect class="card pink" x="388" y="472" width="270" height="116" rx="18"/>
    <rect class="card green" x="56" y="502" width="260" height="104" rx="18"/>
  </g>

  <text class="head" x="82" y="190">Forza Horizon 6</text>
  <text class="text" x="82" y="218">screen frames</text>
  <text class="mono" x="82" y="246">live game window</text>

  <text class="head" x="82" y="366">Data Out</text>
  <text class="text" x="82" y="394">324-byte Car Dash packet</text>
  <text class="mono" x="82" y="422">speed, position, state</text>

  <text class="head" x="416" y="276">ForzaDriveEnv</text>
  <text class="text" x="416" y="306">obs: image, speed, line</text>
  <text class="text" x="416" y="330">reward: route progress</text>
  <text class="mono" x="416" y="360">done: detector or halt</text>

  <text class="head" x="764" y="192">DreamerV3</text>
  <text class="text" x="764" y="222">world model and actor</text>
  <text class="text" x="764" y="246">async learner</text>
  <text class="mono" x="764" y="270">forza / forza_full</text>

  <text class="head" x="764" y="398">Replay</text>
  <text class="text" x="764" y="426">warm-start episodes</text>
  <text class="text" x="764" y="450">live rollouts and demos</text>

  <text class="head" x="416" y="510">Virtual gamepad</text>
  <text class="text" x="416" y="538">steer, throttle, brake</text>
  <text class="mono" x="416" y="566">vgamepad / ViGEmBus</text>

  <text class="head" x="82" y="538">Recovery</text>
  <text class="text" x="82" y="566">AutoDrive first</text>
  <text class="mono" x="82" y="590">smooth drive-back only</text>

  <path class="flowC" d="M316 213 C350 213 350 276 388 276" marker-end="url(#arrowC)"/>
  <path class="flowC" d="M316 389 C352 389 350 326 388 326" marker-end="url(#arrowC)"/>
  <path class="flowG" d="M658 304 H736" marker-end="url(#arrowG)"/>
  <path class="flowY" d="M877 288 V360" marker-end="url(#arrowY)"/>
  <path class="flowP" d="M736 220 C694 220 700 530 658 530" marker-end="url(#arrowP)"/>
  <path class="flowP" d="M388 530 H316" marker-end="url(#arrowP)"/>
  <path class="flowG" d="M388 356 C330 450 292 502 244 502" marker-end="url(#arrowG)"/>
  <path class="dash" d="M316 554 C506 638 916 612 916 480" marker-end="url(#arrowG)"/>
  <path class="dash" d="M523 472 C598 430 646 404 736 420" marker-end="url(#arrowG)"/>
  <path class="dash" d="M523 588 V632 H32 V214 C32 184 44 178 56 178" marker-end="url(#arrowP)"/>

  <text class="label" x="335" y="204">frames</text>
  <text class="label" x="335" y="412">telemetry</text>
  <text class="label" x="674" y="294">transition</text>
  <text class="label" x="688" y="210">action</text>
  <text class="label" x="330" y="548">recover</text>
  <text class="label" x="560" y="630">recovery demos</text>
</svg>
