<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">Horizon FSD architecture</title>
  <desc id="desc">Data flow from Forza Horizon screen and telemetry into the environment, DreamerV3, virtual gamepad control, replay, and recovery demonstrations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#86efac"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8fb7c9"/>
    </marker>
    <style>
      .title { font: 800 34px "Segoe UI", Arial, sans-serif; fill: #f8fafc; }
      .section { font: 700 18px "Segoe UI", Arial, sans-serif; fill: #e2e8f0; }
      .text { font: 500 14px "Segoe UI", Arial, sans-serif; fill: #cbd5e1; }
      .mono { font: 600 13px "Cascadia Mono", Consolas, monospace; fill: #dbeafe; }
      .box { fill: rgba(15,23,42,.88); stroke: rgba(148,163,184,.35); stroke-width: 1.2; }
      .thin { stroke: #8fb7c9; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .soft { stroke: rgba(148,163,184,.28); stroke-width: 2; fill: none; }
    </style>
  </defs>

  <rect width="1180" height="620" rx="24" fill="url(#bg)"/>
  <text class="title" x="44" y="56">Horizon FSD System Architecture</text>
  <text class="text" x="46" y="86">A real-time game environment wired into DreamerV3, telemetry reward shaping, and recovery replay.</text>

  <g transform="translate(50 138)">
    <rect class="box" x="0" y="0" width="240" height="170" rx="18"/>
    <rect x="20" y="24" width="70" height="70" rx="16" fill="url(#blue)"/>
    <path d="M36 68 C52 44 70 44 82 68" stroke="#eff6ff" stroke-width="5" fill="none" stroke-linecap="round"/>
    <text class="section" x="110" y="42">Forza Horizon</text>
    <text class="text" x="110" y="70">screen frames</text>
    <text class="text" x="110" y="94">Data Out UDP</text>
    <text class="text" x="110" y="118">game physics</text>
    <text class="mono" x="22" y="140">FH Car Dash 324 bytes</text>
  </g>

  <g transform="translate(370 92)">
    <rect class="box" x="0" y="0" width="250" height="130" rx="18"/>
    <text class="section" x="24" y="38">Capture + Telemetry</text>
    <text class="text" x="24" y="68">Windows.Graphics.Capture</text>
    <text class="text" x="24" y="92">UDP parser + latest packet</text>
    <text class="mono" x="24" y="116">image, speed, position</text>
  </g>

  <g transform="translate(370 300)">
    <rect class="box" x="0" y="0" width="250" height="150" rx="18"/>
    <text class="section" x="24" y="38">ForzaDriveEnv</text>
    <text class="text" x="24" y="68">old-gym API</text>
    <text class="text" x="24" y="92">line cue + reward</text>
    <text class="text" x="24" y="116">crash/stuck detection</text>
    <text class="mono" x="24" y="138">obs -> action -> reward</text>
  </g>

  <g transform="translate(720 92)">
    <rect class="box" x="0" y="0" width="250" height="150" rx="18"/>
    <text class="section" x="24" y="38">DreamerV3</text>
    <text class="text" x="24" y="68">world model</text>
    <text class="text" x="24" y="92">actor + critic</text>
    <text class="text" x="24" y="116">async learner</text>
    <text class="mono" x="24" y="138">small model, low VRAM</text>
  </g>

  <g transform="translate(720 330)">
    <rect class="box" x="0" y="0" width="250" height="140" rx="18"/>
    <text class="section" x="24" y="38">Replay Buffer</text>
    <text class="text" x="24" y="68">warm-start episodes</text>
    <text class="text" x="24" y="92">live rollouts</text>
    <text class="text" x="24" y="116">AutoDrive demos</text>
  </g>

  <g transform="translate(910 500)">
    <rect class="box" x="0" y="0" width="220" height="84" rx="18"/>
    <text class="section" x="24" y="34">Virtual Gamepad</text>
    <text class="text" x="24" y="60">steer, throttle, brake</text>
  </g>

  <g transform="translate(50 392)">
    <rect class="box" x="0" y="0" width="240" height="150" rx="18"/>
    <rect x="20" y="26" width="62" height="62" rx="16" fill="url(#gold)"/>
    <path d="M33 58 H70 M52 38 V78" stroke="#111827" stroke-width="6" stroke-linecap="round"/>
    <text class="section" x="104" y="42">Recovery</text>
    <text class="text" x="104" y="70">rewind</text>
    <text class="text" x="104" y="94">ANNA AutoDrive</text>
    <text class="text" x="104" y="118">telemetry gate</text>
  </g>

  <path class="thin" d="M290 205 C322 182 338 158 370 148"/>
  <path class="thin" d="M495 222 V300"/>
  <path class="thin" d="M620 365 C676 340 696 224 720 177"/>
  <path class="thin" d="M970 168 C1050 210 1054 390 1020 500"/>
  <path class="thin" d="M910 542 C735 585 319 575 170 542"/>
  <path class="thin" d="M290 468 C322 450 340 428 370 400"/>
  <path class="thin" d="M620 400 C658 406 682 406 720 402"/>
  <path class="thin" d="M845 330 V242"/>

  <path class="soft" d="M160 308 C210 342 246 370 290 400"/>
  <text class="mono" x="646" y="300">actions</text>
  <text class="mono" x="639" y="424">episodes</text>
  <text class="mono" x="1010" y="362">pad input</text>
  <text class="mono" x="224" y="570">game responds</text>
</svg>
