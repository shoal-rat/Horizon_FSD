<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="660" viewBox="0 0 1180 660" role="img" aria-labelledby="title desc">
  <title id="title">AutoDrive recovery loop</title>
  <desc id="desc">Recovery flow for ended episodes: AutoDrive may drive back, open a transfer prompt, accept a parallel road, or fall back to reset and manual wait.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0f2238"/>
      <stop offset="1" stop-color="#0a141d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.48" stop-color="#34d399"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#000000" flood-opacity="0.40"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#9fb6c5"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#4ecb9a"/>
    </marker>
    <marker id="arrowP" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#ec6ca6"/>
    </marker>
    <style>
      .title { font: 800 34px "Segoe UI", Arial, sans-serif; fill: #f7fbff; }
      .lede { font: 500 15px "Segoe UI", Arial, sans-serif; fill: #acc7dd; }
      .head { font: 760 18px "Segoe UI", Arial, sans-serif; fill: #f4f9ff; }
      .text { font: 520 13.5px "Segoe UI", Arial, sans-serif; fill: #c6d7e8; }
      .mono { font: 650 12.5px "Cascadia Mono", Consolas, monospace; fill: #bfe9ff; }
      .label { font: 650 12px "Cascadia Mono", Consolas, monospace; fill: #9eb9d2; }
      .card { fill: rgba(13, 25, 42, 0.86); stroke: rgba(160, 190, 220, 0.32); stroke-width: 1.2; }
      .red { stroke: #fb7185; }
      .green { stroke: #34d399; }
      .cyan { stroke: #38bdf8; }
      .violet { stroke: #a78bfa; }
      .amber { stroke: #fbbf24; }
      .flow { fill: none; stroke: #9fb6c5; stroke-width: 2.5; }
      .flowG { fill: none; stroke: #4ecb9a; stroke-width: 2.5; }
      .flowP { fill: none; stroke: #ec6ca6; stroke-width: 2.5; }
      .dash { fill: none; stroke: #8da8c4; stroke-width: 2.1; stroke-dasharray: 8 8; }
    </style>
  </defs>

  <rect width="1180" height="660" rx="28" fill="url(#bg)"/>
  <rect x="48" y="42" width="96" height="6" rx="3" fill="url(#accent)"/>
  <text class="title" x="48" y="86">AutoDrive recovery</text>
  <text class="lede" x="50" y="112">A smooth drive-back can be replay data. A teleport is only a way to keep the run alive.</text>

  <g filter="url(#shadow)">
    <rect class="card red" x="52" y="168" width="222" height="108" rx="18"/>
    <rect class="card cyan" x="326" y="168" width="238" height="108" rx="18"/>
    <rect class="card green" x="620" y="132" width="270" height="100" rx="18"/>
    <rect class="card violet" x="620" y="270" width="270" height="100" rx="18"/>
    <rect class="card cyan" x="620" y="408" width="270" height="100" rx="18"/>
    <rect class="card green" x="940" y="224" width="190" height="116" rx="18"/>
    <rect class="card amber" x="326" y="444" width="238" height="108" rx="18"/>
    <rect class="card red" x="620" y="548" width="400" height="78" rx="18"/>
    <rect class="card green" x="940" y="408" width="190" height="92" rx="18"/>
  </g>

  <text class="head" x="78" y="204">Episode ends</text>
  <text class="text" x="78" y="230">impact, stuck, offroute</text>
  <text class="mono" x="78" y="254">detector reason</text>

  <text class="head" x="352" y="204">Open ANNA</text>
  <text class="text" x="352" y="230">needs a pinned waypoint</text>
  <text class="mono" x="352" y="254">Down, Left, A</text>

  <text class="head" x="646" y="168">Drive-back</text>
  <text class="text" x="646" y="194">AutoDrive returns to route</text>
  <text class="mono" x="646" y="216">save recovery-*.npz</text>

  <text class="head" x="646" y="306">Transfer prompt</text>
  <text class="text" x="646" y="332">press A only while frozen</text>
  <text class="mono" x="646" y="354">teleport: safety only</text>

  <text class="head" x="646" y="444">Parallel road</text>
  <text class="text" x="646" y="470">upright and drivable</text>
  <text class="mono" x="646" y="492">accept if configured</text>

  <text class="head" x="966" y="260">Verify</text>
  <text class="text" x="966" y="286">upright, live UDP</text>
  <text class="text" x="966" y="310">grace window</text>

  <text class="head" x="352" y="480">Reset menu</text>
  <text class="text" x="352" y="506">last automated fallback</text>
  <text class="mono" x="352" y="530">Start, L3, A</text>

  <text class="head" x="646" y="584">Manual wait</text>
  <text class="text" x="646" y="608">neutral pad; learner can train from replay</text>

  <text class="head" x="966" y="444">Resume</text>
  <text class="text" x="966" y="472">next live episode</text>

  <path class="flow" d="M274 222 H326" marker-end="url(#arrow)"/>
  <path class="flowG" d="M564 206 C594 182 598 182 620 182" marker-end="url(#arrowG)"/>
  <path class="flow" d="M564 222 C598 294 598 320 620 320" marker-end="url(#arrow)"/>
  <path class="flow" d="M564 238 C598 398 598 458 620 458" marker-end="url(#arrow)"/>
  <path class="flowG" d="M890 182 C922 190 926 248 940 270" marker-end="url(#arrowG)"/>
  <path class="flow" d="M890 320 H940" marker-end="url(#arrow)"/>
  <path class="flow" d="M890 458 C922 432 926 328 940 310" marker-end="url(#arrow)"/>
  <path class="flowG" d="M1035 340 V408" marker-end="url(#arrowG)"/>
  <path class="flowP" d="M445 276 V444" marker-end="url(#arrowP)"/>
  <path class="flowP" d="M564 498 C594 540 598 586 620 586" marker-end="url(#arrowP)"/>
  <path class="dash" d="M1020 586 C1090 560 1090 500 1035 500" marker-end="url(#arrow)"/>

  <text class="label" x="284" y="212">recover()</text>
  <text class="label" x="456" y="374">failed</text>
  <text class="label" x="574" y="548">still stuck</text>
  <text class="label" x="1048" y="382">verified</text>
</svg>
