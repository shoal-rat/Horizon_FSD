# Horizon FSD - central configuration.
#
# Phase 0 (telemetry_probe.py) does NOT read this file; it is pure stdlib and
# takes CLI args. This file documents the intended settings for Phases 1+.
# Values marked CONFIRM-IN-PHASE-0 depend on what the live FH6 probe shows.

telemetry:
  host: "0.0.0.0"          # interface to bind the UDP listener on
  port: 9999               # MUST equal the in-game Data Out port. Avoid 5200-5300 (game-reserved).
  packet_size: 324         # FH4/5 'Car Dash'. CONFIRM-IN-PHASE-0 against the live FH6 packet length.
  recv_timeout_s: 1.0
  stale_after_s: 0.15      # telemetry older than this (alt-tab/hitch) = stale -> step ends 'telemetry_lost'
  resume_timeout_s: 30.0   # after telemetry_lost, wait this long for the stream to come back before raising

capture:                   # windows-capture (Windows.Graphics.Capture) backend
  monitor_index: 1         # 1-based monitor (1 = primary); ignored if window_name set
  window_name: null        # capture a specific window by title (e.g. "Forza Horizon 6"), or null
  region: null             # [left, top, right, bottom] in captured pixels, or null for full
  img_width: 84            # (legacy preview tools only; the RL obs is 64x64 from the dreamer config)
  img_height: 84
  grayscale: false         # COLOR obs: the racing-line chevrons keep their semantics in the image
  #                          (in gray, blue->luma 29 / red->76 - both inside the asphalt range), so
  #                          the model can SEE the line day AND night. Demos must be color too
  #                          (make_warmstart skips legacy gray sessions; record.py stores color).
  max_frame_age_s: 1.5     # frozen-render threshold (load screen / alt-tab) -> benign frame_lost
  cursor_capture: false    # include the mouse cursor in frames

action:
  # continuous action = [steer in -1..1, throttle in 0..1, brake in 0..1]
  steer_range: [-1.0, 1.0]
  throttle_range: [0.0, 1.0]
  brake_range: [0.0, 1.0]

rl_reward:
  speed_cap: 40.0
  progress_scale: 1.0
  centerline_path: "C:/Horizon_FSD/centerline.npy"
  progress_max_step: 2.0
  progress_jump_guard: 5.0
  route_max_dist: 18.0      # == detector.offroute_dist: don't credit progress wider than the detector tolerates
  align_w: 0.4              # reward moving ALONG the route (velocity.tangent) - the night-safe steering signal
  align_min_speed: 1.5      # below this, velocity direction is too noisy to trust
  cross_w: 0.3              # small lateral-distance penalty (pull to centre)
  penalty_cap: 1.5          # per-step cap on offroad/slip penalties (crash penalty stays dominant)
  boot_w: 0.3
  offroad_rumble: 0.15
  offroad_w: 2.0
  slip_deadband: 1.0
  slip_w: 0.5
  jerk_w: 0.02
  spin_w: 0.5
  spin_deadband: 0.6
  crash_penalty: 5.0
  line_follow_w: 0.3
  idle_speed: 1.0
  idle_w: 0.05
  steer_w: 0.01
  low_speed_steer_w: 0.08
  low_speed_steer_speed: 5.0
  brake_w: 0.03
  launch_w: 0.04

rl_route:                   # route-geometry obs (light-invariant path preview, GT-Sophy style)
  lookahead_spacing_m: 8.0  # arc spacing of the 10 lookahead points (80 m preview)
  heading_min_speed: 2.0    # below this, velocity direction is noise -> heading invalid (flag 0)

rl_safety:
  # Runtime guardrails for early live RL. These clamp only the gamepad command,
  # not the replay action coordinate system.
  steer_limit: 0.55
  high_speed_steer_limit: 0.35
  high_speed_threshold: 15.0
  recovery_grace_s: 1.5    # after a reset, skip crash detection this long so the dead-stop handoff
  #                          doesn't immediately re-trip stuck/noprogress while the agent takes over
  runway_steps: 20         # decision-steps of per-episode runway (offroute/noprogress/stuck suppressed)
  #                          so the agent gets ~2s to act before a detector can kill the episode

detector:
  # When to END an episode (and run recovery). Route-aware checks need centerline.npy.
  offroad_rumble: 0.15         # surface rumble above this = off the paved road (ANY speed now)
  offroad_seconds: 1.0         # ... sustained this long -> reset
  offroute_dist: 18.0          # m from the route centreline = off the route -> reset (keeps the car
  offroute_seconds: 0.8        #   NEAR the route so AutoDrive recovers it with a short drive, not a
  #                                teleport to a distant road). Lower this to reset sooner.
  noprogress_seconds: 5.0      # on-route but no centreline advance this long = circling/wrong-way -> reset
  noprogress_min_advance: 3.0
  stuck_speed: 2.0
  stuck_seconds: 1.5
  centerline_path: "C:/Horizon_FSD/centerline.npy"

reset:
  # Reset/respawn in Horizon can place the car on a nearby flat surface, not
  # necessarily on the target road. When centerline.npy is present, recovery is
  # accepted only if telemetry projects close to that training route.
  centerline_path: "C:/Horizon_FSD/centerline.npy"
  route_max_dist: 22.0
  require_route_if_available: true
  on_road_rumble: 0.15
  min_recovered_speed: 3.0
  on_road_speed: 5.0
  autodrive_timeout_s: 45.0           # was 90: escalate to the pause-reset fallback sooner
  autodrive_prompt_retry_s: 1.0
  autodrive_prompt_attempts: 3        # confirm-A presses for the teleport prompt; only sent while FROZEN
  autodrive_prompt_settle_s: 0.6      # car must be positionally frozen this long before the confirm-A
  autodrive_frozen_eps: 0.5           # per-tick world motion (m) at/below which the car counts as frozen
  autodrive_reissue_s: 10.0
  autodrive_engage_deadline_s: 8.0    # bail to pause-reset if AutoDrive never moves the car (no waypoint)
  autodrive_progress_min_m: 2.0
  autodrive_on_route_settle_s: 0.7
  autodrive_persistent: true
  autodrive_persistent_retry_s: 2.0
  persistent_max_seconds: 300.0       # give up + return FAILED after this, never an infinite hang
  autodrive_teleport_jump_m: 30.0
  persistent_max_backoff_s: 15.0
  heartbeat_every: 5

recovery_demos:
  # Save smooth, non-teleport AutoDrive recoveries as Dreamer replay episodes.
  # Teleport/prompt recoveries are used to keep training alive but are not teachable.
  enabled: true
  out_dir: "C:/Horizon_FSD/dreamer_logs/forza/recovery_eps"   # sibling dir: train_eps purges don't sweep it
  min_len: 16
  max_len: 1200
  sample_hz: 10.0
  teleport_jump_m: 30.0

dataset:                      # recording-session frame filters (make_warmstart)
  min_speed: 1.0              # drop frames slower than this (m/s) - parked/idle
  crash_speed_drop: 3.0       # speed drop (m/s) within one 0.05s step => impact
  crash_accel: 60.0           # |acceleration| (m/s^2) spike => impact (normal p99~19)
  crash_window: 8             # frames dropped on each side of an impact (~0.4s)
  max_tire_slip: 8.0          # drop frames with extreme wheelspin/slide (keeps dirt driving)
  autodrive_surface_rumble: 0.15  # extra off-road filter, autodrive-quality sessions only

paths:
  recordings_dir: "C:/Horizon_FSD/recordings"
  checkpoints_dir: "C:/Horizon_FSD/checkpoints"
  tensorboard_dir: "C:/Horizon_FSD/runs"
